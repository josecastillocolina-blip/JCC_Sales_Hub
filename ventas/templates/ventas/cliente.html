<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JCC Sales Hub - Cliente</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <style>
      :root {
        --azul-master: #1a237e;
        --gris-fondo: #f4f6f9;
      }
      body {
        background-color: var(--gris-fondo);
        font-family: "Segoe UI", sans-serif;
      }
      .sidebar {
        min-height: 100vh;
        background: var(--azul-master);
        color: white;
      }
      .nav-link {
        color: #bdc3c7;
        padding: 12px 20px;
        transition: 0.3s;
        text-decoration: none;
        display: block;
      }
      .nav-link:hover {
        background: rgba(255, 255, 255, 0.1);
        color: white;
      }
      .main-content {
        padding: 40px;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <nav class="col-md-2 sidebar p-0">
          <div class="p-4 text-center">
            <h5 class="fw-bold m-0">JCC Sales Hub</h5>
            <hr class="text-white-50" />
            <div class="small">
              <i class="bi bi-person-badge"></i> CLIENTE: {{ user.username|upper
              }}
            </div>
          </div>
          <ul class="nav flex-column px-2">
            <li class="nav-item mt-2">
              <a class="nav-link text-warning" href="{% url 'login' %}">
                <i class="bi bi-box-arrow-left me-2"></i> Cerrar Sesión
              </a>
            </li>
          </ul>
        </nav>

        <main class="col-md-10 main-content">
          <div
            class="card shadow-sm border-0 p-5 text-center bg-white"
            style="border-radius: 15px"
          >
            <i class="bi bi-shop display-1 text-primary mb-4"></i>
            <h1 class="fw-bold" style="color: var(--azul-master)">
              ¡Bienvenido a JCC Sales Hub!
            </h1>
            <p class="text-muted fs-5">
              Hola <b>{{ user.username }}</b>, tu registro como cliente ha sido
              exitoso.
            </p>
            <div class="alert alert-info d-inline-block mt-3">
              <i class="bi bi-info-circle me-2"></i>
              Estamos preparando nuestro catálogo digital. Muy pronto podrás
              realizar tus pedidos desde aquí.
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
