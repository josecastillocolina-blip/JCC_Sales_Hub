<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JCC Sales Hub - Registro de Cliente</title>

    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .login-card {
        background: #ffffff;
        padding: 40px;
        border-radius: 8px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 380px;
      }

      .header {
        text-align: center;
        margin-bottom: 30px;
      }

      .header h1 {
        color: #1a237e;
        margin: 0;
        font-size: 24px;
        border-bottom: 2px solid #1a237e;
        display: inline-block;
        padding-bottom: 5px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        color: #555;
        font-weight: bold;
      }

      input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 16px;
      }

      button {
        width: 100%;
        padding: 12px;
        background-color: #1a237e;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: background 0.3s;
      }

      button:hover {
        background-color: #0d1442;
      }

      .footer-links {
        margin-top: 20px;
        text-align: center;
        font-size: 14px;
        color: #777;
      }

      .footer-links a {
        color: #1a237e;
        text-decoration: none;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="login-card">
      <div class="header">
        <h1>JCC Sales Hub</h1>
        <p>Registro de Nuevo Cliente</p>
      </div>

      <form method="POST">
        {% csrf_token %}

        <div class="form-group">
          <label>Usuario:</label>
          <input
            type="text"
            name="username"
            required
            placeholder="Ej: cliente_barinas"
          />
        </div>

        <div class="form-group">
          <label>Correo Electrónico:</label>
          <input
            type="email"
            name="email"
            required
            placeholder="correo@ejemplo.com"
          />
        </div>

        <div class="form-group">
          <label>Contraseña:</label>
          <input
            type="password"
            name="password"
            required
            placeholder="••••••••"
          />
        </div>

        <button type="submit">Crear Cuenta</button>
      </form>

      <div class="footer-links">
        <p>
          ¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia Sesión aquí</a>
        </p>
        <p>© 2026 - Ingeniería de Software</p>
      </div>
    </div>
  </body>
</html>
